<svg xmlns="http://w3.org" viewBox="0 0 600 70" width="600" height="70">
  <style>
    .typewriter-text {
      font-family: 'Fira Code', monospace, sans-serif;
      font-weight: 800;
      font-size: 28px;
      fill: #F74075;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
    }
    
    /* Each language fades in and out in the exact same spot sequentially */
    .lang1 { animation: cycleText 16s infinite 0s; }
    .lang2 { animation: cycleText 16s infinite 4s; }
    .lang3 { animation: cycleText 16s infinite 8s; }
    .lang4 { animation: cycleText 16s infinite 12s; }

    @keyframes cycleText {
      0%, 5% { opacity: 0; }
      10%, 20% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
  </style>

  <!-- This centers the group and positions the text strings exactly on top of each other -->
  <g transform="translate(300, 35)">
    <text class="typewriter-text lang1">👋 Hello, World!</text>
    <text class="typewriter-text lang2">🌍 Bonjour le monde!</text>
    <text class="typewriter-text lang3">✨ Hola, Mundo!</text>
    <text class="typewriter-text lang4">🌸 こんにちは世界!</text>
  </g>
</svg>
